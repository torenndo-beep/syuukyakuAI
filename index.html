<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS集客AIアドバイザー | TikTok & YouTube 特化</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f0;
    --bg-tertiary: #eeede8;
    --text: #1a1a1a;
    --text-secondary: #6b6b67;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-mid: #AFA9EC;
    --purple-dark: #534AB7;
    --green: #1D9E75;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #2e2e2e;
      --text: #f0efe9;
      --text-secondary: #a0a09a;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
      --purple-light: #26215C;
      --purple-mid: #3C3489;
      --purple-dark: #CECBF6;
    }
  }

  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .page-title {
    text-align: center;
    margin-bottom: 20px;
  }
  .page-title h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .page-title p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    height: 700px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* Header */
  .header {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--purple);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .header-icon i { color: #fff; font-size: 18px; }
  .header-title { font-size: 15px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--text-secondary); }
  .status { display: flex; align-items: center; gap: 5px; margin-left: auto; font-size: 12px; color: var(--text-secondary); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  /* Setup Panel */
  .setup-panel {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-secondary);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .setup-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* Platform buttons */
  .platform-btns { display: flex; gap: 8px; }
  .pl-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    font-weight: 400;
  }
  .pl-btn:hover:not(.active) { background: var(--bg-tertiary); }
  .pl-btn.tiktok.active { background: #111; color: #fff; border-color: #111; }
  .pl-btn.youtube.active { background: #D85A30; color: #fff; border-color: #D85A30; }

  /* Industry grid */
  .industry-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .ind-btn {
    padding: 9px 4px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    line-height: 1.5;
    transition: all 0.15s;
  }
  .ind-btn:hover:not(.active) { background: var(--bg-tertiary); }
  .ind-btn.active { background: var(--purple-light); color: var(--purple-dark); border-color: var(--purple-mid); }

  /* Start button */
  .start-btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--purple);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .start-btn:hover { opacity: 0.85; }
  .start-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; gap: 8px; max-width: 90%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }
  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .ai .msg-avatar { background: var(--purple); color: #fff; }
  .user .msg-avatar { background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border); }
  .msg-inner { display: flex; flex-direction: column; gap: 6px; }
  .msg-bubble {
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
  }
  .ai .msg-bubble {
    background: var(--bg-secondary);
    color: var(--text);
    border-radius: 4px 18px 18px 18px;
    border: 0.5px solid var(--border);
  }
  .user .msg-bubble {
    background: var(--purple);
    color: #fff;
    border-radius: 18px 4px 18px 18px;
  }

  /* Badges */
  .context-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge.tiktok { background: #2C2C2A; color: #D3D1C7; }
  .badge.youtube { background: #FAECE7; color: #993C1D; }
  .badge.industry { background: var(--purple-light); color: var(--purple-dark); }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    border: 0.5px solid var(--purple-mid);
    background: var(--purple-light);
    color: var(--purple-dark);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .chip:hover { background: #CECBF6; }

  /* Typing indicator */
  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--bg);
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 100px;
    outline: none;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: var(--purple); }
  #user-input::placeholder { color: var(--text-secondary); }
  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--purple);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Reset button */
  .reset-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: var(--bg-secondary); }

  .hidden { display: none !important; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* API key notice */
  .api-notice {
    background: #FAEEDA;
    color: #633806;
    border: 0.5px solid #FAC775;
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .api-notice strong { font-weight: 500; }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .industry-grid { grid-template-columns: repeat(2, 1fr); }
    .app { height: calc(100vh - 100px); }
  }
</style>
</head>
<body>

<div class="page-title">
  <h1>SNS集客AIアドバイザー</h1>
  <p>TikTok & YouTube 特化 — フォロワー・再生数・エンゲージメントを伸ばす</p>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-icon"><i class="ti ti-chart-line"></i></div>
    <div>
      <div class="header-title">SNS集客AIアドバイザー</div>
      <div class="header-sub">TikTok & YouTube 特化</div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span>オンライン</span>
    </div>
  </div>

  <!-- Setup Panel -->
  <div class="setup-panel" id="setup-panel">

    <div class="api-notice">
      <strong>⚠️ APIキーの設定が必要です。</strong><br>
      このファイルをテキストエディタで開き、下部の <code>YOUR_API_KEY_HERE</code> をAnthropicのAPIキーに書き換えてください。<br>
      APIキーの取得: <a href="https://console.anthropic.com" target="_blank" style="color:#633806">console.anthropic.com</a>
    </div>

    <div>
      <div class="setup-label">プラットフォームを選択（複数可）</div>
      <div class="platform-btns">
        <button class="pl-btn tiktok active" onclick="togglePlatform(this,'TikTok')" data-p="TikTok">
          <i class="ti ti-brand-tiktok"></i> TikTok
        </button>
        <button class="pl-btn youtube" onclick="togglePlatform(this,'YouTube')" data-p="YouTube">
          <i class="ti ti-brand-youtube"></i> YouTube
        </button>
      </div>
    </div>

    <div>
      <div class="setup-label">業種を選択</div>
      <div class="industry-grid">
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="飲食・カフェ">🍜<br>飲食・カフェ</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="美容・サロン">💄<br>美容・サロン</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="ECショップ">🛍<br>ECショップ</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="フィットネス">💪<br>フィットネス</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="教育・スクール">📚<br>教育・スクール</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="不動産">🏠<br>不動産</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="クリエイター">🎨<br>クリエイター</button>
        <button class="ind-btn" onclick="selectIndustry(this)" data-i="その他">✦<br>その他</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startChat()" disabled>業種を選んで開始する</button>
  </div>

  <!-- Chat -->
  <div class="messages hidden" id="messages"></div>

  <div class="input-area hidden" id="input-area">
    <textarea id="user-input" placeholder="お悩みを入力してください…" rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="送信">
      <i class="ti ti-send" style="font-size:16px"></i>
    </button>
  </div>
</div>

<div class="footer">Powered by Claude AI — Anthropic</div>

<script>
// ========================================
// ⚠️ ここにAPIキーを入力してください
const API_KEY = 'sb_publishable_nc8Ce0uMhSIPO9hDY8cZOw_KW6AM-9j';
// ========================================

let platforms = ['TikTok'];
let industry = '';
let history = [];
let loading = false;

const CHIPS = {
  '飲食・カフェ':   ['バズる料理動画の作り方', '来店客を増やすには？', '投稿頻度とベスト時間帯'],
  '美容・サロン':   ['施術動画でフォロワーを増やしたい', 'Before/Afterのコツは？', '予約につながる投稿は？'],
  'ECショップ':     ['商品紹介動画の構成を教えて', 'CVRを上げる見せ方', 'ハッシュタグ戦略は？'],
  'フィットネス':   ['ワークアウト動画がバズるには？', '有料プランへの誘導方法', 'チャンネル登録を増やすには'],
  '教育・スクール': ['無料コンテンツで集客したい', '信頼感を出す動画の構成', '問い合わせを増やすには'],
  '不動産':         ['物件紹介動画のコツ', '地域密着で差をつけるには', 'チャンネルのコンセプト相談'],
  'クリエイター':   ['登録者1万人への戦略', 'マネタイズの始め方', 'コラボ相手の探し方'],
  'その他':         ['フォロワーを増やしたい', '再生回数を伸ばしたい', 'バズる投稿のコツを教えて'],
};

function togglePlatform(btn, name) {
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) {
    if (!platforms.includes(name)) platforms.push(name);
  } else {
    platforms = platforms.filter(p => p !== name);
  }
  updateStartBtn();
}

function selectIndustry(btn) {
  document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  industry = btn.dataset.i;
  updateStartBtn();
}

function updateStartBtn() {
  const btn = document.getElementById('start-btn');
  if (industry && platforms.length > 0) {
    btn.disabled = false;
    btn.textContent = `${platforms.join(' & ')} × ${industry} で始める →`;
  } else if (!industry) {
    btn.disabled = true;
    btn.textContent = '業種を選んで開始する';
  } else {
    btn.disabled = true;
    btn.textContent = 'プラットフォームを選んでください';
  }
}

function startChat() {
  document.getElementById('setup-panel').classList.add('hidden');
  document.getElementById('messages').classList.remove('hidden');
  document.getElementById('input-area').classList.remove('hidden');

  const badgeHtml = platforms.map(p =>
    `<span class="badge ${p.toLowerCase()}">${p}</span>`
  ).join('') + `<span class="badge industry">${industry}</span>`;

  addAiMessage(
    `設定完了しました！\n${platforms.join('・')} × ${industry} に特化したアドバイスをします。\nどんなことでもお気軽にご相談ください。`,
    badgeHtml,
    CHIPS[industry] || CHIPS['その他']
  );
}

function addAiMessage(text, badgeHtml, chips) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.innerHTML = '<i class="ti ti-sparkles" style="font-size:14px"></i>';

  const inner = document.createElement('div');
  inner.className = 'msg-inner';

  if (badgeHtml) {
    const b = document.createElement('div');
    b.className = 'context-badges';
    b.innerHTML = badgeHtml;
    inner.appendChild(b);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  inner.appendChild(bubble);

  if (chips && chips.length) {
    const cc = document.createElement('div');
    cc.className = 'chips';
    chips.forEach(c => {
      const s = document.createElement('button');
      s.className = 'chip';
      s.textContent = c;
      s.onclick = () => { document.getElementById('user-input').value = c; sendMessage(); };
      cc.appendChild(s);
    });
    inner.appendChild(cc);
  }

  div.appendChild(avatar);
  div.appendChild(inner);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addUserMessage(text) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar"><i class="ti ti-user" style="font-size:14px"></i></div>
    <div class="msg-inner">
      <div class="msg-bubble">${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-ind';
  div.innerHTML = `
    <div class="msg-avatar"><i class="ti ti-sparkles" style="font-size:14px"></i></div>
    <div class="msg-bubble typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-ind');
  if (t) t.remove();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  if (loading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  if (API_KEY === 'YOUR_API_KEY_HERE') {
    addAiMessage('⚠️ APIキーが設定されていません。\nHTMLファイルをテキストエディタで開き、YOUR_API_KEY_HERE をAnthropicのAPIキーに書き換えてください。', null, null);
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  loading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  history.push({ role: 'user', content: text });
  showTyping();

  const system = `あなたは${platforms.join('と')}のSNS集客に特化したプロフェッショナルアドバイザーAIです。

【ユーザー情報】
- 業種: ${industry}
- 使用プラットフォーム: ${platforms.join('、')}

【専門領域】
- フォロワー数・チャンネル登録者数の増加戦略
- 再生回数・視聴継続率・インプレッションの最大化
- エンゲージメント率（いいね・コメント・シェア・保存）の改善
- ${industry}業種に特化したコンテンツ企画・投稿戦略
- アルゴリズム対策（${platforms.includes('TikTok') ? 'TikTokのForYouページ攻略、' : ''}${platforms.includes('YouTube') ? 'YouTubeの検索・おすすめ最適化' : ''}）
- サムネイル・タイトル・説明文の最適化
- 投稿頻度・最適な時間帯

【応答スタイル】
- 丁寧でプロフェッショナルな日本語
- ${industry}の事業者目線で具体的なアドバイスをする
- 300〜400字を目安に要点を絞る
- 数字や具体的な施策を盛り込む
- 最後に「次のアクション」を1つ提案する`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'エラーが発生しました。';
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addAiMessage(reply, null, ['もっと詳しく教えて', '他の戦略は？', '具体例を見せて']);
  } catch(e) {
    removeTyping();
    addAiMessage('申し訳ありません。通信エラーが発生しました。\nAPIキーとネットワーク接続を確認してください。', null, null);
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
